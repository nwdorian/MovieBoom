services:
  movieboom.database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: movieboom.database
    environment:
      - MSSQL_SA_PASSWORD=Password123
      - ACCEPT_EULA=Y
    ports:
      - 1433:1433

  movieboom.email:
    image: axllent/mailpit:latest
    container_name: movieboom.mailpit
    restart: unless-stopped
    ports:
      - 8025:8025
      - 1025:1025