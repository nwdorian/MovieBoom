name: Unit Tests

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore tests/ArchitectureTests/ArchitectureTests.csproj

      - name: Build
        run: dotnet build tests/ArchitectureTests/ArchitectureTests.csproj --no-restore

      - name: Run Architecture Tests
        run: dotnet test tests/ArchitectureTests/ArchitectureTests.csproj --no-build