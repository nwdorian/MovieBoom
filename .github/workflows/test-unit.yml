name: Unit Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore tests/ArchitectureTests/ArchitectureTests.csproj

      - name: Build
        run: dotnet build tests/ArchitectureTests/ArchitectureTests.csproj --no-restore

      - name: Run Architecture Tests
        run: dotnet test tests/ArchitectureTests/ArchitectureTests.csproj --no-build