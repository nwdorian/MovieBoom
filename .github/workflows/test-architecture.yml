name: Architecture Tests

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore tests/ArchitectureTests/ArchitectureTests.csproj
      - name: Build
        run: dotnet build tests/ArchitectureTests/ArchitectureTests.csproj --no-restore

  architecture-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Run Architecture Tests
        run: dotnet test tests/ArchitectureTests/ArchitectureTests.csproj --no-build
